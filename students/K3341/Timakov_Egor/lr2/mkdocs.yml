site_name: Лабораторная работа 2 — Потоки, процессы, асинхронность
site_description: Документация к программам сравнения threading, multiprocessing и asyncio
theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Главная: index.md
  - Установка: setup.md
  - Задача 1 — Подсчёт суммы: task1.md
  - Задача 2 — Парсинг веб-страниц: task2.md
  - Замеры и сравнение: benchmarks.md
  - Теория: theory.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
