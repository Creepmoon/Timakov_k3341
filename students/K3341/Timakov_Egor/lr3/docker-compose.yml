services:
  db:
    image: postgres:16-alpine
    container_name: lr3_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collab_platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collab_platform_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lr3_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  parser:
    build:
      context: .
      dockerfile: Dockerfile.parser
    container_name: lr3_parser
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/collab_platform_db
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lr3_api
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/collab_platform_db
      PARSER_URL: http://parser:8001
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-change-me
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      parser:
        condition: service_started
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lr3_celery
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/collab_platform_db
      PARSER_URL: http://parser:8001
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      parser:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  postgres_data:
